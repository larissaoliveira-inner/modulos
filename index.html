<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Squad — Módulos</title>
<style>
  /* ============================================================
     SQUAD DESIGN SYSTEM — tokens
     ============================================================ */
  :root {
    /* Texto */
    --color-text-primary: #0c0d0d;
    --color-text-secondary: #525b5b;
    --color-text-muted: #9ba4a4;
    --color-text-placeholder: #b2b9b9;
    --color-text-subtag: #737c8f;

    /* Superfícies */
    --color-bg-page: #f6f7f7;
    --color-surface: #ffffff;
    --color-surface-glass: rgba(255, 255, 255, 0.72);
    --color-action: #0c0d0d;
    --color-subtle: #ebeded;

    /* Bordas */
    --color-border-glass: rgba(12, 13, 13, 0.08);
    --color-divider: #ebeded;
    --color-timeline-divider: #e2e5e5;

    /* Estados */
    --color-success: #34c759;
    --color-error: #ff3b30;

    /* Acentos da marca */
    --color-accent-indigo: #5b86ef;
    --color-accent-orange: #ff9230;
    --color-accent-green: #01b46c;
    --color-accent-pink: #ff56ae;

    /* Tipografia */
    --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-size-caption: 11px;
    --font-size-footnote: 13px;
    --font-size-body: 15px;
    --font-size-subheadline: 15px;
    --font-weight-subheadline: 590;
    --font-weight-regular: 400;

    /* Spacing */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-12: 48px;
    --space-16: 64px;
    --space-20: 80px;

    /* Radius */
    --radius-icon: 12px;
    --radius-card: 16px;
    --radius-widget: 24px;
    --radius-pill: 999px;

    /* Sombras */
    --shadow-card: 0 1px 2px rgba(12, 13, 13, 0.04), 0 4px 16px rgba(12, 13, 13, 0.06);
    --shadow-card-elevated: 0 2px 4px rgba(12, 13, 13, 0.06), 0 12px 32px rgba(12, 13, 13, 0.10);
    --shadow-filter-pill: 0 1px 3px rgba(12, 13, 13, 0.10);

    /* Accent default (sobrescrito por agente) */
    --accent: var(--color-accent-indigo);
    --accent-soft: rgba(91, 134, 239, 0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-family);
    font-size: var(--font-size-body);
    font-weight: var(--font-weight-regular);
    color: var(--color-text-primary);
    background: var(--color-bg-page);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }

  ::selection { background: var(--accent); color: #fff; }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 var(--space-6); }

  /* Ícones (SVG stroke, herdam currentColor) */
  .ico {
    width: 1em; height: 1em;
    display: inline-block;
    vertical-align: -0.14em;
    flex: 0 0 auto;
  }

  /* ============================================================
     HOME
     ============================================================ */
  .home-header {
    padding: var(--space-16) 0 var(--space-8);
    text-align: center;
  }
  .home-header .kicker {
    font-size: var(--font-size-footnote);
    font-weight: var(--font-weight-subheadline);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-subtag);
    margin-bottom: var(--space-3);
  }
  .home-header h1 {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.08;
  }
  .home-header p {
    margin-top: var(--space-4);
    font-size: 17px;
    color: var(--color-text-secondary);
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Índice de agentes (chips no topo) */
  .agent-nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--color-surface-glass);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--color-border-glass);
  }
  .agent-nav .wrap {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: var(--space-2);
    padding-top: var(--space-3);
    padding-bottom: var(--space-3);
    scrollbar-width: none;
  }
  .agent-nav .wrap::-webkit-scrollbar { display: none; }
  .agent-nav a {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: 6px 12px 6px 6px;
    border-radius: var(--radius-pill);
    background: var(--color-subtle);
    color: var(--color-text-primary);
    text-decoration: none;
    font-size: var(--font-size-footnote);
    font-weight: var(--font-weight-subheadline);
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .agent-nav a:hover { transform: translateY(-1px); }
  .agent-nav a.active {
    background: var(--color-surface);
    box-shadow: 0 0 0 1.5px var(--color-action);
  }
  .agent-nav a img {
    width: 24px; height: 24px; border-radius: var(--radius-pill); object-fit: cover;
  }

  section.agent {
    padding: var(--space-12) 0;
    border-top: 1px solid var(--color-divider);
    scroll-margin-top: 64px;
  }
  section.agent:first-of-type { border-top: none; }

  .agent-head {
    display: flex;
    align-items: center;
    gap: var(--space-5);
    margin-bottom: var(--space-8);
  }
  .agent-avatar {
    width: 88px; height: 88px;
    border-radius: var(--radius-pill);
    object-fit: cover;
    box-shadow: var(--shadow-card);
    border: 3px solid var(--color-surface);
    outline: 3px solid var(--accent);
    flex: 0 0 auto;
  }
  .agent-meta .agent-name {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .agent-meta .agent-tag {
    display: inline-block;
    margin-top: var(--space-2);
    font-size: var(--font-size-footnote);
    font-weight: var(--font-weight-subheadline);
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 10px;
    border-radius: var(--radius-pill);
  }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    grid-auto-rows: 1fr;
    gap: var(--space-4);
  }

  .module-card {
    display: flex;
    flex-direction: column;
    text-align: left;
    background: var(--color-surface);
    border: 1px solid var(--color-border-glass);
    border-radius: var(--radius-card);
    padding: var(--space-5);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow-card);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .module-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent);
    opacity: 0.85;
  }
  .module-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-card-elevated);
    border-color: var(--accent);
  }
  .module-card .m-icon {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-icon);
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 22px;
    margin-bottom: var(--space-4);
  }
  .module-card .m-title {
    font-size: 18px;
    font-weight: var(--font-weight-subheadline);
    letter-spacing: -0.01em;
    margin-bottom: var(--space-2);
  }
  .module-card .m-sub {
    font-size: var(--font-size-footnote);
    color: var(--color-text-secondary);
    line-height: 1.45;
    flex: 1;
  }
  .module-card .m-cta {
    margin-top: var(--space-4);
    font-size: var(--font-size-footnote);
    font-weight: var(--font-weight-subheadline);
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: gap 0.18s ease;
  }
  .module-card:hover .m-cta { gap: 9px; }
  .module-card .m-cta .ico { width: 14px; height: 14px; }

  .module-card.soon {
    cursor: default;
    background: transparent;
    border-style: dashed;
    box-shadow: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--color-text-muted);
    min-height: 150px;
  }
  .module-card.soon::before { display: none; }
  .module-card.soon:hover { transform: none; box-shadow: none; border-color: var(--color-border-glass); }
  .module-card.soon .m-icon { background: var(--color-subtle); color: var(--color-text-muted); }
  .module-card.soon .m-title { color: var(--color-text-muted); }

  /* Card "Em breve" (módulo ainda não lançado) */
  .module-card.is-soon {
    opacity: 0.55;
    cursor: default;
    pointer-events: none;
    box-shadow: none;
    background: var(--color-surface);
  }
  .module-card.is-soon::before { opacity: 0.35; }
  .soon-badge {
    position: absolute;
    top: var(--space-4);
    right: var(--space-4);
    font-size: var(--font-size-caption);
    font-weight: var(--font-weight-subheadline);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-text-muted);
    background: var(--color-subtle);
    padding: 3px 9px;
    border-radius: var(--radius-pill);
  }

  .home-footer {
    padding: var(--space-12) 0 var(--space-16);
    text-align: center;
    color: var(--color-text-muted);
    font-size: var(--font-size-footnote);
    border-top: 1px solid var(--color-divider);
    margin-top: var(--space-8);
  }

  /* ============================================================
     PÁGINA DE MÓDULO (one-pager)
     ============================================================ */
  .module-page { display: none; }
  body.view-module .home { display: none; }
  body.view-module .module-page { display: block; }

  .m-navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--color-surface-glass);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--color-border-glass);
  }
  .m-navbar .wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    padding-top: var(--space-3);
    padding-bottom: var(--space-3);
  }
  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: 8px 14px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--color-border-glass);
    background: var(--color-surface);
    color: var(--color-text-primary);
    text-decoration: none;
    font-size: var(--font-size-footnote);
    font-weight: var(--font-weight-subheadline);
    cursor: pointer;
    box-shadow: var(--shadow-filter-pill);
    transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
  }
  .nav-btn:hover { transform: translateY(-1px); }
  .nav-btn .ico { width: 15px; height: 15px; }
  .nav-btn.home-btn { background: var(--color-action); color: #fff; border-color: var(--color-action); }
  .nav-btn.icon-only { padding: 9px; }
  .nav-btn.icon-only .ico { width: 18px; height: 18px; }
  .nav-btn.disabled { opacity: 0.35; pointer-events: none; }
  .nav-center {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    font-size: var(--font-size-footnote);
    color: var(--color-text-secondary);
    min-width: 0;
  }
  .nav-center img { width: 26px; height: 26px; border-radius: var(--radius-pill); object-fit: cover; outline: 2px solid var(--accent); }
  .nav-center b { color: var(--color-text-primary); font-weight: var(--font-weight-subheadline); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-actions { display: flex; gap: var(--space-2); }

  /* HERO */
  .m-hero {
    position: relative;
    overflow: hidden;
    padding: var(--space-10) 0 var(--space-8);
    background:
      radial-gradient(120% 140% at 100% 0%, color-mix(in srgb, var(--accent) 22%, transparent) 0%, transparent 55%),
      radial-gradient(120% 140% at 0% 20%, color-mix(in srgb, var(--accent) 12%, transparent) 0%, transparent 50%),
      var(--color-bg-page);
  }
  .m-hero .agent-chip {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: 5px 12px 5px 5px;
    background: var(--color-surface);
    border: 1px solid var(--color-border-glass);
    border-radius: var(--radius-pill);
    font-size: var(--font-size-footnote);
    font-weight: var(--font-weight-subheadline);
    box-shadow: var(--shadow-card);
    margin-bottom: var(--space-4);
  }
  .m-hero .agent-chip img { width: 26px; height: 26px; border-radius: var(--radius-pill); object-fit: cover; }
  .m-hero .agent-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .m-hero h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    max-width: 24ch;
  }
  .m-hero .subheadline {
    margin-top: var(--space-4);
    font-size: 19px;
    line-height: 1.4;
    color: var(--color-text-secondary);
    max-width: 74ch;
    font-weight: 400;
  }

  /* Hero em 2 colunas quando há vídeo */
  .m-hero-grid { display: flex; align-items: center; gap: var(--space-10); }
  .m-hero-text { flex: 1 1 auto; min-width: 0; }
  .m-hero-media { flex: 0 0 34%; max-width: 360px; }
  .m-hero-media[hidden] { display: none; }

  /* Mockup de MacBook */
  .device {
    display: block;
    width: 100%;
    padding: 0;
    border: none;
    background: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .device .screen {
    position: relative;
    background: #0c0d0d;
    border-radius: 14px;
    padding: 8px;
    box-shadow: 0 18px 40px rgba(12, 13, 13, 0.22), 0 2px 6px rgba(12, 13, 13, 0.12);
  }
  .device .media {
    border-radius: 6px;
    overflow: hidden;
    background: #000;
    line-height: 0;
  }
  .device .media video { width: 100%; height: auto; display: block; }
  .device .base {
    display: block;
    width: 116%;
    height: 12px;
    margin: 0 auto;
    margin-left: -8%;
    background: linear-gradient(180deg, #d7dada 0%, #b4baba 55%, #9aa0a0 100%);
    border-radius: 0 0 10px 10px;
    position: relative;
    box-shadow: 0 6px 10px rgba(12, 13, 13, 0.14);
  }
  .device .base::after {
    content: "";
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 15%; height: 5px;
    background: #9aa0a0;
    border-radius: 0 0 7px 7px;
  }
  .play-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 66px; height: 66px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(12, 13, 13, 0.3);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .device:hover .play-btn { transform: translate(-50%, -50%) scale(1.08); background: #fff; }
  .play-btn svg { width: 26px; height: 26px; fill: var(--color-text-primary); margin-left: 3px; }

  /* Lightbox de vídeo */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: var(--space-8);
    background: rgba(12, 13, 13, 0.55);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
  }
  .lightbox.open { display: flex; animation: lb-fade 0.2s ease; }
  @keyframes lb-fade { from { opacity: 0; } to { opacity: 1; } }
  .lb-stage {
    position: relative;
    width: min(1100px, 92vw);
    max-height: 86vh;
    border-radius: var(--radius-card);
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    background: #000;
  }
  .lb-stage video { width: 100%; max-height: 86vh; display: block; }
  .lb-close {
    position: absolute;
    top: var(--space-5); right: var(--space-5);
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(12, 13, 13, 0.55);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 2;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .lb-close:hover { background: rgba(12, 13, 13, 0.85); transform: scale(1.06); }
  .lb-close .ico { width: 20px; height: 20px; }

  .m-section { padding: var(--space-8) 0; }
  .m-section-label {
    font-size: var(--font-size-footnote);
    font-weight: var(--font-weight-subheadline);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: var(--space-3);
  }

  /* Tira de problemas */
  .m-problem {
    background: var(--color-surface);
    border: 1px solid var(--color-border-glass);
    border-left: 4px solid var(--accent);
    border-radius: var(--radius-card);
    padding: var(--space-5) var(--space-6);
    box-shadow: var(--shadow-card);
  }
  .m-problem p {
    font-size: 18px;
    line-height: 1.45;
    color: var(--color-text-primary);
    letter-spacing: -0.01em;
  }

  /* Features */
  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: var(--space-3);
  }
  .feature {
    background: var(--color-surface);
    border: 1px solid var(--color-border-glass);
    border-radius: var(--radius-card);
    padding: var(--space-5);
    box-shadow: var(--shadow-card);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .feature:hover { transform: translateY(-2px); box-shadow: var(--shadow-card-elevated); }
  .feature .f-icon {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-icon);
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 19px;
    margin-bottom: var(--space-3);
  }
  .feature h3 {
    font-size: 15px;
    font-weight: var(--font-weight-subheadline);
    letter-spacing: -0.01em;
    margin-bottom: var(--space-1);
  }
  .feature p {
    font-size: var(--font-size-footnote);
    color: var(--color-text-secondary);
    line-height: 1.5;
  }

  /* Closer */
  .m-closer {
    border-radius: var(--radius-widget);
    padding: var(--space-8);
    color: #fff;
    background:
      radial-gradient(120% 160% at 100% 0%, color-mix(in srgb, var(--accent) 78%, #fff) 0%, transparent 60%),
      color-mix(in srgb, var(--accent) 92%, #000);
    box-shadow: var(--shadow-card-elevated);
    position: relative;
    overflow: hidden;
  }
  .m-closer .c-label {
    font-size: var(--font-size-footnote);
    font-weight: var(--font-weight-subheadline);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: var(--space-3);
  }
  .m-closer p {
    font-size: 20px;
    line-height: 1.4;
    letter-spacing: -0.01em;
    font-weight: var(--font-weight-subheadline);
  }
  .m-closer .note {
    margin-top: var(--space-5);
    padding-top: var(--space-4);
    border-top: 1px solid rgba(255, 255, 255, 0.25);
    font-size: var(--font-size-footnote);
    opacity: 0.9;
    font-weight: var(--font-weight-regular);
    line-height: 1.5;
    display: flex;
    gap: var(--space-2);
    align-items: flex-start;
  }
  .m-closer .note .ico { width: 16px; height: 16px; margin-top: 2px; opacity: 0.9; }

  /* Espaço final da página de módulo */
  .module-page > section.m-section:last-of-type { padding-bottom: var(--space-16); }

  /* Responsivo */
  @media (max-width: 640px) {
    .home-header h1 { font-size: 34px; }
    .m-hero h1 { font-size: 36px; }
    .m-hero .subheadline { font-size: 18px; }
    .m-problem p { font-size: 18px; }
    .m-closer { padding: var(--space-8); }
    .m-closer p { font-size: 20px; }
    .agent-head { gap: var(--space-4); }
    .agent-avatar { width: 68px; height: 68px; }
    .agent-meta .agent-name { font-size: 24px; }
    .nav-center b { max-width: 28vw; }
    .nav-center .sep, .nav-center #navAgent { display: none; }
    .nav-btn .label { display: none; }
    .nav-btn { padding: 9px; }
  }
  @media (max-width: 860px) {
    .m-hero-grid { flex-direction: column; align-items: stretch; gap: var(--space-6); }
    .m-hero-media { flex: none; max-width: 400px; }
  }
</style>
</head>
<body>

  <!-- ============================ HOME ============================ -->
  <div class="home">
    <header class="home-header">
      <div class="wrap">

// hex -> rgba (para o fundo suave dos accents)
function softColor(hex, alpha) {
  const h = hex.replace("#", "");
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return "rgba(" + r + ", " + g + ", " + b + ", " + alpha + ")";
}

// Ordem global de módulos (para prev/next)
const FLAT = [];
AGENTS.forEach(a => a.modules.forEach(m => FLAT.push(Object.assign({}, m, { agent: a }))));
const INDEX = {};
FLAT.forEach((m, i) => { INDEX[m.id] = i; });

// ---- HOME ----
function renderHome() {
  const nav = document.getElementById("agentNav");
  const main = document.getElementById("homeMain");
  nav.innerHTML = "";
  main.innerHTML = "";

  AGENTS.forEach(agent => {
    const softBg = softColor(agent.accent, 0.10);

    // chip de navegação
    const chip = document.createElement("a");
    chip.href = "#agent-" + agent.id;
    chip.dataset.agent = agent.id;
    chip.innerHTML = '<img src="' + agent.img + '" alt="' + agent.name + '" /> ' + agent.name;
    nav.appendChild(chip);

    // seção
    const sec = document.createElement("section");
    sec.className = "agent";
    sec.id = "agent-" + agent.id;
    sec.style.setProperty("--accent", agent.accent);
    sec.style.setProperty("--accent-soft", softBg);

    let cards = "";
    agent.modules.forEach(m => {
      cards +=
        '<a class="module-card" href="#/m/' + m.id + '">' +
          '<div class="m-icon">' + icon(m.icon) + '</div>' +
          '<div class="m-title">' + m.title + '</div>' +
          '<div class="m-sub">' + m.sub + '</div>' +
          '<div class="m-cta">Ver módulo ' + icon("chevron-right") + '</div>' +
        '</a>';
    });
    (COMING_SOON[agent.id] || []).forEach(s => {
      cards +=
        '<div class="module-card is-soon">' +
          '<span class="soon-badge">Em breve</span>' +
          '<div class="m-icon">' + icon(s.icon) + '</div>' +
          '<div class="m-title">' + s.title + '</div>' +
        '</div>';
    });
    if (!cards) {
      cards = '<div class="module-card soon"><div class="m-icon">' + icon("more") + '</div><div class="m-title">Módulos em breve</div></div>';
    }

    sec.innerHTML =
      '<div class="wrap">' +
        '<div class="agent-head">' +
          '<img class="agent-avatar" src="' + agent.img + '" alt="' + agent.name + '" />' +
          '<div class="agent-meta">' +
            '<div class="agent-name">' + agent.name + '</div>' +
            '<span class="agent-tag">' + agent.tagline + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="modules-grid">' + cards + '</div>' +
      '</div>';
    main.appendChild(sec);
  });
}

// ---- PÁGINA DE MÓDULO ----
function renderModule(id) {
  const i = INDEX[id];
  if (i === undefined) { location.hash = ""; return; }
  const m = FLAT[i];
  const agent = m.agent;

  document.body.style.setProperty("--accent", agent.accent);
  document.body.style.setProperty("--accent-soft", softColor(agent.accent, 0.10));

  // navbar
  document.getElementById("navAvatar").src = agent.img;
  document.getElementById("navAgent").textContent = agent.name;
  document.getElementById("navModule").textContent = m.title;

  // hero
  document.getElementById("heroAvatar").src = agent.img;
  document.getElementById("heroAgent").textContent = agent.name + " · " + agent.tagline;
  document.getElementById("heroTitle").textContent = m.title;
  document.getElementById("heroSub").textContent = m.sub;

  // vídeo de preview (mockup no hero + lightbox)
  const heroMedia = document.getElementById("heroMedia");
  const heroVideo = document.getElementById("heroVideo");
  const heroPlay = document.getElementById("heroPlay");
  const videoSrc = VIDEOS[m.id];
  if (videoSrc) {
    const encoded = encodeURI(videoSrc) + "#t=0.1";
    if (heroVideo.getAttribute("src") !== encoded) heroVideo.src = encoded;
    heroMedia.hidden = false;
    heroPlay.onclick = function () { window.openLightbox(videoSrc); };
  } else {
    heroMedia.hidden = true;
    heroVideo.removeAttribute("src");
    heroPlay.onclick = null;
  }

  // problema
  document.getElementById("problemText").textContent = m.problem;

  // features
  const fg = document.getElementById("featuresGrid");
  fg.innerHTML = m.features.map(f =>
    '<div class="feature">' +
      '<div class="f-icon">' + icon(f.icon) + '</div>' +
      '<h3>' + f.title + '</h3>' +
      '<p>' + f.text + '</p>' +
    '</div>'
  ).join("");

  // closer
  document.getElementById("closerText").textContent = m.closer;
  const noteEl = document.getElementById("closerNote");
  if (m.note) {
    noteEl.innerHTML = icon("info") + '<span></span>';
    noteEl.querySelector("span").textContent = m.note;
    noteEl.style.display = "";
  } else {
    noteEl.style.display = "none";
  }

  // prev / next (circular) — no navbar do topo
  const many = FLAT.length > 1;
  const prev = FLAT[(i - 1 + FLAT.length) % FLAT.length];
  const next = FLAT[(i + 1) % FLAT.length];
  setNav("navPrev", prev, many);
  setNav("navNext", next, many);

  document.body.classList.add("view-module");
  window.scrollTo(0, 0);
}

function setNav(elId, target, show) {
  const el = document.getElementById(elId);
  if (!show) { el.classList.add("disabled"); el.removeAttribute("href"); return; }
  el.classList.remove("disabled");
  el.href = "#/m/" + target.id;
  el.title = target.title;
}

// Preenche os ícones dos elementos estáticos (uma vez)
function fillStaticIcons() {
  document.getElementById("btnHome").innerHTML = icon("home");
  document.getElementById("navPrev").innerHTML = icon("chevron-left") + '<span class="label">Anterior</span>';
  document.getElementById("navNext").innerHTML = '<span class="label">Próximo</span>' + icon("chevron-right");
}

// ---- ROTEAMENTO ----
function route() {
  const hash = location.hash || "";
  const match = hash.match(/^#\/m\/(.+)$/);
  if (match) {
    renderModule(match[1]);
  } else {
    document.body.classList.remove("view-module");
    // âncora de agente (#agent-...) → o scroll nativo cuida
  }
}

renderHome();
fillStaticIcons();
window.addEventListener("hashchange", route);
route();

// Scroll-spy: contorna o chip do agente em foco no agent-nav
function updateActiveAgent() {
  if (document.body.classList.contains("view-module")) return;
  const navEl = document.querySelector(".agent-nav");
  const offset = (navEl ? navEl.offsetHeight : 0) + 48;
  const y = window.scrollY + offset;
  let currentId = AGENTS.length ? AGENTS[0].id : null;
  AGENTS.forEach(function (a) {
    const el = document.getElementById("agent-" + a.id);
    if (el && el.offsetTop <= y) currentId = a.id;
  });
  document.querySelectorAll(".agent-nav a").forEach(function (link) {
    link.classList.toggle("active", link.dataset.agent === currentId);
  });
}
let spyTick = false;
window.addEventListener("scroll", function () {
  if (spyTick) return;
  spyTick = true;
  requestAnimationFrame(function () { updateActiveAgent(); spyTick = false; });
}, { passive: true });
window.addEventListener("resize", updateActiveAgent);
window.addEventListener("hashchange", updateActiveAgent);
updateActiveAgent();
</script>

  <!-- ======================= LIGHTBOX DE VÍDEO ======================= -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lb-close" id="lbClose" aria-label="Fechar"></button>
    <div class="lb-stage">
      <video id="lbVideo" controls playsinline></video>
    </div>
  </div>

<script>
(function () {
  const lb = document.getElementById("lightbox");
  const lbVideo = document.getElementById("lbVideo");
  const lbClose = document.getElementById("lbClose");
  lbClose.innerHTML = icon("x") || "×";

  window.openLightbox = function (src) {
    if (!src) return;
    lbVideo.src = encodeURI(src);
    lb.classList.add("open");
    lb.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
    lbVideo.currentTime = 0;
    lbVideo.play().catch(function () {});
  };
  function closeLightbox() {
    lbVideo.pause();
    lbVideo.removeAttribute("src");
    lbVideo.load();
    lb.classList.remove("open");
    lb.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  }
  window.closeLightbox = closeLightbox;

  lbClose.addEventListener("click", closeLightbox);
  lb.addEventListener("click", function (e) { if (e.target === lb) closeLightbox(); });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && lb.classList.contains("open")) closeLightbox();
  });
})();
</script>
